# AI Engineering Harness — manifesto central do template
# Lido por humanos e agentes. Não contém regra de negócio.
# Caminhos relativos à raiz do projeto hospedeiro (template montado em .claude/).
version: 1

project:
  # Preencha/ajuste por projeto (ou deixe a detecção automática descobrir):
  # bash .claude/scripts/ai/detect-project.sh
  layering: hexagonal-ddd-pragmatic
  design_principles: [SOLID, hexagonal-architecture, pragmatic-ddd]

agents:
  claude_code:
    instructions: .claude/CLAUDE.md
    agents_dir: .claude/agents
    skills_dir: .claude/skills
    commands_dir: .claude/commands
    prompts_dir: .claude/harness_engineer/prompts
    permissions_example: .claude/permissions/settings.json
    mcp_example: .claude/mcp/mcp.example.json

workflow:
  mandatory: inspect -> plan -> failing-test -> minimal-implementation -> refactor -> quality-gates -> report
  tdd: required
  bdd: when-business-behavior
  solid: required-for-production-code

quality_gates:
  format:        { tool: spotless,   script: .claude/scripts/quality/format-check.sh, required: true }
  style:         { tool: checkstyle, script: .claude/scripts/quality/checkstyle.sh, config: .claude/skills/java-quality-gate/config/checkstyle/checkstyle-java25.xml, required: true }
  unit_tests:    { script: .claude/scripts/quality/test-unit.sh, required: true }
  integration:   { script: .claude/scripts/quality/test-integration.sh, required: when-external-dependency }
  bdd:           { script: .claude/scripts/quality/test-bdd.sh, required: when-business-behavior }
  coverage:      { tool: jacoco, script: .claude/scripts/quality/jacoco.sh, min_line: 90, min_branch: 90, required: true }
  mutation:      { tool: pit,    script: .claude/scripts/quality/mutation-test.sh, min_score: 90, required: true }
  architecture:  { tool: archunit, script: .claude/scripts/quality/archunit.sh, fallback: .claude/scripts/quality/package-rules.sh, required: true }
  orchestrator:  { script: .claude/scripts/quality/verify-all.sh, flags: [--fast, --full, --no-mutation, --no-integration, --no-bdd, --skip-coverage] }

ai_scripts:
  detect_project: .claude/scripts/ai/detect-project.sh
  preflight:      .claude/scripts/ai/preflight.sh

governance:
  severity_matrix: .claude/references/review-severity-matrix.md
  evidence_rules:  .claude/references/evidence-rules.md
  agent_selection: .claude/references/agent-selection-matrix.md
  change_size:     .claude/references/change-size-guidelines.md
  gate_policy:     .claude/references/quality-gate-policy.md

reports_dir: .claude/harness_engineer/results

safety:
  never_run_without_confirmation:
    - rm -rf
    - git reset --hard
    - git clean -fdx
    - docker system prune -a
    - drop database
    - terraform apply
    - kubectl delete
    - aws *delete*
  never_expose: [tokens, secrets, .env, aws-credentials, certificates, private-keys]
  build_changes: propose-and-example   # nunca alterar pom/gradle com risco sem proposta + .example
  no_global_install: true
  no_delete_existing_files: true
  no_package_restructure_without_approval: true

token_economy:
  tools_optional: [repomix, rtk, ccusage]
  principles:
    - surgical-context-per-task
    - preserve-headroom
    - summarize-large-logs-keep-stacktrace
    - never-compress-code-semantics
